<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="imgGrid">
        <h1>Gallery</h1>
        <div class="photo-grid">
            <div class="photo">
                <img src="images/1.jpg" alt="Image 1">
                <span class="imgNum">1</span>
            </div>
            <div class="photo">
                <img src="images/2.jpg" alt="Image 2">
                <span class="imgNum">2</span>
            </div>
            <div class="photo">
                <img src="images/3.jpg" alt="Image 3">
                <span class="imgNum">3</span>
            </div>
            <div class="photo">
                <img src="images/4.jpg" alt="Image 4">
                <span class="imgNum">4</span>
            </div>
            <div class="photo">
                <img src="images/5.jpg" alt="Image 5">
                <span class="imgNum">5</span>
            </div>
            <div class="photo">
                <img src="images/6.jpg" alt="Image 6">
                <span class="imgNum">6</span>
            </div>
        </div>
    </div>


</body>

</html>
