<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Image Grid</h1>
    <div class="photo-grid">
        <div class="photo square"><img src="images/image1.jpg" alt="Image 1"></div>
        <div class="photo large-landscape"><img src="images/image2.jpg" alt="Image 2"></div>
        <div class="photo medium-landscape"><img src="images/image3.jpg" alt="Image 3"></div>


        <div class="photo square"><img src="images/image4.jpg" alt="Image 4"></div>
        <div class="photo medium-landscape"><img src="images/image5.jpg" alt="Image 5"></div>
        <div class="photo large-landscape"><img src="images/image6.jpg" alt="Image 6"></div>


        <div class="photo square"><img src="images/image7.jpg" alt="Image 7"></div>
        <div class="photo medium-landscape"><img src="images/image8.jpg" alt="Image 8"></div>
        <div class="photo square"><img src="images/image9.jpg" alt="Image 9"></div>
    </div>

</body>

</html>
