<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="clock-container">
        <div class="clock">
            <span style="--num_loc:1;"><b>1</b></span>
            <span style="--num_loc:2;"><b>2</b></span>
            <span style="--num_loc:3;"><b>3</b></span>
            <span style="--num_loc:4;"><b>4</b></span>
            <span style="--num_loc:5;"><b>5</b></span>
            <span style="--num_loc:6;"><b>6</b></span>
            <span style="--num_loc:7;"><b>7</b></span>
            <span style="--num_loc:8;"><b>8</b></span>
            <span style="--num_loc:9;"><b>9</b></span>
            <span style="--num_loc:10;"><b>10</b></span>
            <span style="--num_loc:11;"><b>11</b></span>
            <span style="--num_loc:12;"><b>12</b></span>

            <div class="hand hour-hand"></div>
            <div class="hand minute-hand"></div>
            <div class="hand second-hand"></div>
            <div class="center-dot"></div>
        </div>
    </div>
    <!-- <script src="script.js"></script> -->
</body>

</html>
